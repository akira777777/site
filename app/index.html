      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Cyber Slots",
        "url": "%VITE_SITE_URL%/",

        "offers": {
          "@type": "Offer",
          "price": "0",

    <title>Cyber Slots — Spin to Win</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
